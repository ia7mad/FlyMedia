name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install vpk CLI
        run: dotnet tool install -g vpk

      - name: Publish self-contained EXE
        run: |
          dotnet publish -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish\win-x64

      - name: Download previous release (for delta + Setup.exe)
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl https://github.com/ia7mad/FlyMedia `
            --outputDir releases
        continue-on-error: true   # first release has nothing to download

      - name: Package with Velopack
        run: |
          vpk pack `
            --packId FlyMedia `
            --packVersion ${{ steps.version.outputs.VERSION }} `
            --packDir publish\win-x64 `
            --mainExe FlyMedia.exe `
            --outputDir releases

      - name: Rename Setup.exe
        shell: pwsh
        run: |
          Rename-Item releases\Setup.exe "FlyMedia-${{ github.ref_name }}-Setup.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlyMedia ${{ github.ref_name }}
          files: |
            releases/FlyMedia-${{ github.ref_name }}-Setup.exe
            releases/*.nupkg
          generate_release_notes: true
          body: |
            ## Install
            1. Download **FlyMedia-${{ github.ref_name }}-Setup.exe** below
            2. Run it — no installer needed, no .NET required
            3. A tray icon appears near the clock — right-click for settings

            **Already installed?** The app updates itself automatically in the background.

            **Requires:** Windows 10 / 11 (64-bit)
